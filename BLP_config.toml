[model]
names = ["Bell-LaPadula"]

[levels]
order = ["Unclassified", "Confidential", "Secret", "Top Secret"]

[categories]
sets = ["Nuclear", "Crypto", "Personnel"]

[subjects]
"guest" = { clearance = "Unclassified", categories = [] }
"intern" = { clearance = "Confidential", categories = ["Personnel"] }
"analyst" = { clearance = "Secret", categories = ["Crypto"] }
"engineer" = { clearance = "Secret", categories = ["Nuclear"] }
"admin" = { clearance = "Top Secret", categories = ["Crypto", "Nuclear", "Personnel"] }

[objects]
"public_status.txt" = { level = "Unclassified", categories = [] }
"employee_directory.csv" = { level = "Confidential", categories = ["Personnel"] }
"crypto_keys.txt" = { level = "Top Secret", categories = ["Crypto"] }
"reactor_report.txt" = { level = "Secret", categories = ["Nuclear"] }
"joint_incident_report.txt" = { level = "Top Secret", categories = ["Crypto", "Nuclear"] }
"admin_audit.log" = { level = "Secret", categories = ["Personnel"] }

# Optional future analyzer annotations:
