[model]
names = ["Biba"]

[integrity_levels]
order = ["Untrusted", "Low Integrity", "Medium Integrity", "High Integrity", "Trusted"]

[categories]
sets = ["Sensor", "Audit", "Control", "Config"]

[objects]
"stdin" = { integrity = "Untrusted", categories = [] }
"stdout" = { integrity = "Untrusted", categories = [] }
"public_upload" = { integrity = "Untrusted", categories = [] }
"sensor_readings.csv" = { integrity = "Low Integrity", categories = ["Sensor"] }
"operator_notes.txt" = { integrity = "Medium Integrity", categories = ["Control"] }
"audit_log.txt" = { integrity = "High Integrity", categories = ["Audit"] }
"system_config.toml" = { integrity = "Trusted", categories = ["Config"] }
"control_plan.txt" = { integrity = "High Integrity", categories = ["Control", "Config"] }

[effects.SOURCE]
reads = "public_upload"
returns = true

[effects.SINK]
writes = "system_config.toml"
reads_from_args = [0]

[effects.scanf]
reads = "stdin"
writes_to_args = [1]

[effects.printf]
writes = "stdout"
reads_from_args = [1, 2]

[effects.SOURCE_PUBLIC_UPLOAD]
reads = "public_upload"
returns = true

[effects.SOURCE_SENSOR_READINGS]
reads = "sensor_readings.csv"
returns = true

[effects.SOURCE_OPERATOR_NOTES]
reads = "operator_notes.txt"
returns = true

[effects.SINK_AUDIT_LOG]
writes = "audit_log.txt"
reads_from_args = [0]

[effects.SINK_SYSTEM_CONFIG]
writes = "system_config.toml"
reads_from_args = [0]

[effects.SINK_CONTROL_PLAN]
writes = "control_plan.txt"
reads_from_args = [0]
