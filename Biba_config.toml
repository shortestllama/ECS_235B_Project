[model]
names = ["Biba"]

[integrity_levels]
order = ["Untrusted", "Low Integrity", "Medium Integrity", "High Integrity", "Trusted"]

[categories]
sets = ["Sensor", "Audit", "Control", "Config"]

[subjects]
"guest" = { integrity = "Untrusted", categories = [] }
"sensor_agent" = { integrity = "Low Integrity", categories = ["Sensor"] }
"operator" = { integrity = "Medium Integrity", categories = ["Control"] }
"auditor" = { integrity = "High Integrity", categories = ["Audit"] }
"admin" = { integrity = "Trusted", categories = ["Sensor", "Audit", "Control", "Config"] }

[objects]
"public_upload.txt" = { integrity = "Untrusted", categories = [] }
"sensor_readings.csv" = { integrity = "Low Integrity", categories = ["Sensor"] }
"operator_notes.txt" = { integrity = "Medium Integrity", categories = ["Control"] }
"audit_log.txt" = { integrity = "High Integrity", categories = ["Audit"] }
"system_config.toml" = { integrity = "Trusted", categories = ["Config"] }
"control_plan.txt" = { integrity = "High Integrity", categories = ["Control", "Config"] }

# Optional future analyzer annotations:
#
# These are not part of the core Biba policy. They would map
# LLVM/program behavior onto the subjects and objects above.
